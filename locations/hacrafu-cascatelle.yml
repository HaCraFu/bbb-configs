---

location: hacrafu-cascatelle
location_nice: Ambulatorium, Karl-Liebknecht-Str. 35, 15345 Eggersdorf
latitude: 52.53527
longitude: 13.82261
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-cascatelle
    role: corerouter
    model: "cudy_wr3000h-v1"
    wireless_profile: freifunk_hacrafu
    host__rclocal__to_merge:
      - |
        uci set network.vlan_10.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_40.ports='lan1:u lan2:u lan3:u lan4:u wan:u'
        uci set network.vlan_42.ports='lan1:t lan2:t lan3:t lan4:t'
        uci commit network; reload_config

ipv6_prefix: "2001:bf7:850:2300::/56"

# DHCP    10.31.235.0/27
# MESH    10.31.90.52/30
# MGMT    10.31.90.56/30

snmp_devices:
  - hostname: hacrafu-cascatelle-nano
    address: 10.31.90.58
    snmp_profile: airos_6

networks:
  # MESH NanoBeam M5 16
  - vid: 10
    role: mesh
    name: mesh_nano
    prefix: 10.31.90.54/32
    ipv6_subprefix: -10
    ptp: true

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.90.52/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-cascatelle
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.90.53/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-cascatelle
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.235.0/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-cascatelle: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.90.56/30
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-cascatelle: 1  # 57
      hacrafu-cascatelle-nano: 2  # 58

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-cascatelle: 44-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-cascatelle: 13-20

