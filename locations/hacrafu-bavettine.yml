---

location: hacrafu-bavettine
location_nice: Dorfstraße 67, 15370 Petershagen, Nordseite
latitude: 52.52383958328241
longitude: 13.7701680466266
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu"
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-bavettine-core
    role: corerouter
    model: "glinet_gl_ar300m16"
    wireless_profile: freifunk_hacrafu

ipv6_prefix: "2001:bf7:850:1900::/56"

# dhcp      10.31.197.128/27
# mesh5     10.31.29.254/32
# mesh2     10.31.30.28/32
# MGMT      10.31.30.45/32

# Disable noping
# dhcp_no_ping: false

networks:

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.29.254/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-bavettine-core
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.30.28/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-bavettine-core
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    untagged: true
    inbound_filtering: false
    enforce_client_isolation: false
    prefix: 10.31.197.128/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-bavettine-core: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.30.45/32
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-bavettine-core: 1

# only place this ssh-keys
ssh_keys:
  - comment: Tom
    key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICIpPZouLOf+1WT9ylMa/9mX1dhLTy8W07Q8G5w7KKNz tom_hacrafu