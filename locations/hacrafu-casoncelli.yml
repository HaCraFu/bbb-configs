---

location: hacrafu-casoncelli
location_nice: Bäckerei Noebe, Karl-Marx-Str. 15, 15345 Eggersdorf
latitude: 52.539588079
longitude: 13.822131157
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-casoncelli
    role: corerouter
    model: "cudy_wr3000-v1"
    wireless_profile: freifunk_hacrafu
    host__rclocal__to_merge:
      - |
        uci set network.vlan_10.ports='lan1:t lan2:t lan3:t'
        uci set network.vlan_22.ports='lan1:t lan2:t lan3:t'
        uci set network.vlan_23.ports='lan1:t lan2:t lan3:t'
        uci set network.vlan_40.ports='lan1:u lan2:u lan3:u'
        uci set network.vlan_42.ports='lan1:t lan2:t lan3:t'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

  - hostname: hacrafu-casoncelli-ap
    role: ap
    model: "cudy_ap3000outdoor-v1"
    wireless_profile: freifunk_hacrafu

ipv6_prefix: "2001:bf7:850:5d00::/56"

# DHCP    10.248.108.96/27
# MESH    10.31.98.144/29
# MGMT    10.31.98.152/29
# TUNNEL  10.31.18.96/31

snmp_devices:
  - hostname: hacrafu-casoncelli-lite
    address: 10.31.98.155
    snmp_profile: airos_6

networks:
  # MESH LiteBeam M5 23
  - vid: 10
    role: mesh
    name: mesh_lite
    prefix: 10.31.98.148/32
    ipv6_subprefix: -10
    ptp: true

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.98.144/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-casoncelli
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.98.145/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-casoncelli
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - AP
  - vid: 22
    role: mesh
    name: mesh_5g_ap
    prefix: 10.31.98.146/32
    ipv6_subprefix: -22
    mesh_ap: hacrafu-casoncelli-ap
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - AP
  - vid: 23
    role: mesh
    name: mesh_2g_ap
    prefix: 10.31.98.147/32
    ipv6_subprefix: -23
    mesh_ap: hacrafu-casoncelli-ap
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.108.96/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-casoncelli: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.98.152/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-casoncelli: 1  # 153
      hacrafu-casoncelli-ap: 2  # 154
      hacrafu-casoncelli-lite: 3  # 155

  # Uplink
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.31.18.96/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.31.18.97/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-casoncelli: 36-40
  hacrafu-casoncelli-ap: 44-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-casoncelli: 13-20
  hacrafu-casoncelli-ap: 9-20

