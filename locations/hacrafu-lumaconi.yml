---

location: hacrafu-lumaconi
location_nice: Mainstraße 14, 15370 Petershagen
latitude: 52.534135753
longitude: 13.793812394
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-lumaconi
    role: corerouter
    model: "cudy_wr3000-v1"
    wireless_profile: freifunk_hacrafu
    # flow_offload: hw
    host__rclocal__to_merge:
      - |
        uci set network.vlan_40.ports='lan1:u lan2:u lan3:u'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

snmp_devices:
  - hostname: hacrafu-lumaconi-nano
    address: 10.31.81.74
    snmp_profile: airos_8

  - hostname: hacrafu-lumaconi-lite
    address: 10.31.81.75
    snmp_profile: airos_8

ipv6_prefix: "2001:bf7:850:5b00::/56"

# DHCP      10.31.80.192/28
# MESH      10.31.81.64/30
# MGMT      10.31.81.72/29
# TUNNEL    10.31.52.34/31

networks:
  # MESH NANO
  - vid: 10
    role: mesh
    name: mesh_nano
    prefix: 10.31.81.64/32
    ipv6_subprefix: -10

  # MESH LITE
  - vid: 11
    role: mesh
    name: mesh_lite
    prefix: 10.31.81.65/32
    ipv6_subprefix: -11

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.81.66/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-lumaconi
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.81.67/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-lumaconi
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.80.192/28
    ipv6_subprefix: 0
    assignments:
      hacrafu-lumaconi: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.81.72/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-lumaconi: 1  # 73
      hacrafu-lumaconi-nano: 2  # 74
      hacrafu-lumaconi-lite: 3  # 75

  # UPLINK
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.31.52.34/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.31.52.35/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-lumaconi: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-lumaconi: 13-20

