---

location: hacrafu-ondine
location_nice: MOL
# latitude: 52.0
# longitude: 13.0
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-ondine
    role: corerouter
    model: "genexis_pulse-ex400"
    wireless_profile: freifunk_hacrafu
    host__rclocal__to_merge:
      - |
        uci set network.vlan_40.ports='lan:u'
        uci set network.vlan_42.ports='lan:t'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

ipv6_prefix: "2001:bf7:850:2b00::/56"

# DHCP    10.248.40.96/27
# MESH    10.248.39.168/31
# MGMT    10.248.39.167/32
# TUNNEL  10.248.39.170/31

networks:

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.248.39.168/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-ondine
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.248.39.169/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-ondine
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.40.96/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-ondine: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.39.167/32
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-ondine: 1

  # UPLINK + TUNNEL
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.39.170/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.39.171/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-ondine: 36-40

location__channel_assignments_11g_standard__to_merge:
  hacrafu-ondine: 13-20

ssh_keys:
  - comment: Tom
    key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICIpPZouLOf+1WT9ylMa/9mX1dhLTy8W07Q8G5w7KKNz freifunk@hacrafu.de
