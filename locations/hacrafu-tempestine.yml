---

location: hacrafu-tempestine
location_nice: Dorfstr. 67, 15370 Petershagen
latitude: 52.523707
longitude: 13.770185
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-tempestine
    role: corerouter
    model: "cudy_wr3000h-v1"
    wireless_profile: freifunk_hacrafu
    flow_offload: hw
    host__rclocal__to_merge:
      - |
        uci set network.vlan_40.ports='lan1:u lan2:t lan3:t lan4:t'
        uci set network.vlan_42.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

ipv6_prefix: "2001:bf7:850:2e00::/56"

# DHCP    10.248.40.224/27
# MESH    10.248.39.184/31
# MGMT    10.248.39.181/32
# TUNNEL  10.248.39.186/31

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.248.39.184/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-tempestine
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.248.39.185/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-tempestine
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.40.224/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-tempestine: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.39.181/32
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-tempestine: 1

  # UPLINK + TUNNEL
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.39.186/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.39.187/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-tempestine: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-tempestine: 13-20

