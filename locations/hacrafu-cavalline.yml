---

location: hacrafu-cavalline
location_nice: Petershagen/Eggersdorf
# latitude: 52.0
# longitude: 13.0
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-cavalline
    role: corerouter
    model: "dlink_dap-x1860-a1"
    wireless_profile: mesh_only

  - hostname: hacrafu-cavalline-ap
    role: ap
    model: "dlink_dap-x1860-a1"
    wireless_profile: freifunk_hacrafu_ap_only

ipv6_prefix: "2001:bf7:850:5800::/56"

# DHCP    10.31.79.80/28
# MESH    10.31.26.136/31
# MGMT    10.31.28.56/31
# TUNNEL  10.31.29.4/31

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.26.136/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-cavalline
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.26.137/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-cavalline
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.79.80/28
    ipv6_subprefix: 0
    assignments:
      hacrafu-cavalline: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.28.56/31
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-cavalline: 1
      hacrafu-cavalline-ap: 2

