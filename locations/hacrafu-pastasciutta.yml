---

location: hacrafu-pastasciutta
location_nice: Große Straße 45, 15344 Strausberg
latitude: 52.581953479
longitude: 13.882341385
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-pastasciutta
    role: corerouter
    model: "mikrotik_routerboard-750gr3"
    host__rclocal__to_merge:
      - |
        uci set network.vlan_20.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_21.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_22.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_23.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_24.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_25.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_40.ports='lan2:t lan3:t lan4:u lan5:u'
        uci set network.vlan_41.ports='lan2:t lan3:u lan4:t lan5:t'
        uci set network.vlan_42.ports='lan2:t lan3:t lan4:t lan5:t'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

  - hostname: hacrafu-pastasciutta-yard
    role: ap
    model: "cudy_ap3000outdoor-v1"
    wireless_profile: pasta

  - hostname: hacrafu-pastasciutta-street
    role: ap
    model: "cudy_ap3000outdoor-v1"
    wireless_profile: pasta

  - hostname: hacrafu-pastasciutta-guest
    role: ap
    model: "cudy_wr3000-v1"
    wireless_profile: pasta

ipv6_prefix: "2001:bf7:850:1a00::/56"

# DHCP      10.248.110.192/26
#  Public   10.248.110.192/27
#  Private  10.248.110.224/27
# MESH      10.31.107.216/29
# MGMT      10.31.155.112/29
# TUNNEL    10.31.247.254/31

networks:
  # MESH - 5 GHz 802.11s - Yard
  - vid: 20
    role: mesh
    name: mesh_5g_yrd
    prefix: 10.31.107.216/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-pastasciutta-yard
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Yard
  - vid: 21
    role: mesh
    name: mesh_2g_yrd
    prefix: 10.31.107.217/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-pastasciutta-yard
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - Street
  - vid: 22
    role: mesh
    name: mesh_5g_str
    prefix: 10.31.107.218/32
    ipv6_subprefix: -22
    mesh_ap: hacrafu-pastasciutta-street
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Street
  - vid: 23
    role: mesh
    name: mesh_2g_str
    prefix: 10.31.107.219/32
    ipv6_subprefix: -23
    mesh_ap: hacrafu-pastasciutta-street
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - Guest
  - vid: 24
    role: mesh
    name: mesh_5g_gst
    prefix: 10.31.107.220/32
    ipv6_subprefix: -24
    mesh_ap: hacrafu-pastasciutta-guest
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Guest
  - vid: 25
    role: mesh
    name: mesh_2g_gst
    prefix: 10.31.107.221/32
    ipv6_subprefix: -25
    mesh_ap: hacrafu-pastasciutta-guest
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP - public
  - vid: 40
    role: dhcp
    igress: 50
    egress: 10
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.110.192/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-pastasciutta: 1

  # DHCP - private
  - vid: 41
    role: dhcp
    name: private
    inbound_filtering: true
    enforce_client_isolation: false
    no_corerouter_dns_record: true
    prefix: 10.248.110.224/27
    ipv6_subprefix: 1
    assignments:
      hacrafu-pastasciutta: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.155.112/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 2
    assignments:
      hacrafu-pastasciutta: 1  # 113
      hacrafu-pastasciutta-yard: 2  # 114
      hacrafu-pastasciutta-street: 3  # 115
      hacrafu-pastasciutta-guest: 4  # 116
      hacrafu-pastasciutta-switch: 5  # 117

  # UPLINK
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.31.247.254/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.31.247.255/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-pastasciutta: 36-40
  hacrafu-pastasciutta-yard: 36-40
  hacrafu-pastasciutta-street: 36-40
  hacrafu-pastasciutta-guest: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-pastasciutta: 13-20
  hacrafu-pastasciutta-yard: 13-20
  hacrafu-pastasciutta-street: 13-20
  hacrafu-pastasciutta-guest: 13-20

# Wireless profile
location__wireless_profiles__to_merge:
  - name: pasta
    ifaces:
      - mode: ap
        ssid: freifunk.hacrafu.de
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      # AP for VID 41 (PRIVATE)
      - mode: ap
        ssid: Katerchen
        encryption: sae-mixed
        key: "file:/root/wifi-pwd"
        network: private
        radio: [11a_standard, 11g_standard]
        ifname_hint: pr

      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

# only place this ssh-keys
ssh_keys:
