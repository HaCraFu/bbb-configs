location_nice: Petershagen/Eggersdorf, Testbed Jugi
latitude: 52.527730
longitude: 13.785621
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-ruote-core
    role: corerouter
    model: "tplink_tl-wdr4900-v1"
    wireless_profile: freifunk_hacrafu

  - hostname: hacrafu-ruote-ap-10
    role: ap
    model: "tplink_cpe210-v1"
    wireless_profile: freifunk_hacrafu

  - hostname: hacrafu-ruote-ap-13
    role: ap
    model: "tplink_cpe210-v1"
    wireless_profile: freifunk_hacrafu

ipv6_prefix: "2001:bf7:850:2a00::/56"
# dhcp    10.248.39.128/27
# mesh5   10.31.48.178/32
# mesh2   10.31.48.179/32
# meshAP  10.248.38.92/30
# MGMT    10.248.38.80/29
# TUNNEL  10.248.38.88/31

# Disable noping
# dhcp_no_ping: false

networks:

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.48.178/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-ruote-core
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.48.179/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-ruote-core
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - AP 10
  - vid: 22
    role: mesh
    name: mesh_ap_10
    prefix: 10.248.38.92/32
    ipv6_subprefix: -22
    mesh_ap: hacrafu-ruote-ap-10
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - AP 13
  - vid: 23
    role: mesh
    name: mesh_ap_13
    prefix: 10.248.38.93/32
    ipv6_subprefix: -23
    mesh_ap: hacrafu-ruote-ap-13
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.39.128/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-ruote-core: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.38.80/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-ruote-core: 1  # 81
      hacrafu-ruote-ap-10: 2 # 82
      hacrafu-ruote-ap-13: 3 # 83

  # Uplink
