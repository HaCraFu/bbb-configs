---

location: hacrafu-carbonara-3
location_nice: Petershagen/Eggersdorf # used for event at changing locations
# latitude: 52.0
# longitude: 13.0
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-carbonara-3
    role: corerouter
    model: "tplink_archer-c7-v5"
    wireless_profile: freifunk_hacrafu

ipv6_prefix: "2001:bf7:850:6000::/56"

# DHCP    10.31.254.0/27
# MESH    10.31.66.60/31
# MGMT    10.31.54.152/32

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.66.60/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-carbonara-3
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.66.61/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-carbonara-3
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.254.0/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-carbonara-3: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.54.152/32
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-carbonara-3: 1

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-carbonara-3: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-carbonara-3: 13-20

