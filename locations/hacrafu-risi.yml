---

location: hacrafu-risi
location_nice: Petershagen/Eggersdorf
latitude: 52.557862690108
longitude: 13.830662238774
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-risi
    role: corerouter
    model: "cudy_ap3000outdoor-v1"
    wireless_profile: beach-disco
    host__rclocal__to_merge:
      - |
        uci set network.vlan_50.ports='eth0:u'

ipv6_prefix: "2001:bf7:850:1f00::/56"
# DHCP    10.248.21.96/27
# DHCP    10.31.167.160/27 from cicatelli
# MESH    10.248.20.161/31
# MGMT    10.248.20.163/32
# TUNNEL  10.248.23.254/31

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.248.20.161/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-risi
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.248.20.162/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-risi
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.21.96/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-risi: 1

  # DHCP - private
  - vid: 41
    role: dhcp
    name: private
    inbound_filtering: true
    enforce_client_isolation: false
    no_corerouter_dns_record: true
    prefix: 10.31.167.160/27
    ipv6_subprefix: 2
    assignments:
      hacrafu-risi: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.20.163/32
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-risi: 1

  # Uplink
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.23.254/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.23.255/32
    wireguard_port: 51821

# Wireless profile
location__wireless_profiles__to_merge:
  - name: beach-disco
    ifaces:
      - mode: ap
        ssid: freifunk.hacrafu.de
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      # AP for VID 41 (PRIVATE)
      - mode: ap
        ssid: Weltenphase
        encryption: sae-mixed
        key: "file:/root/wifi-pwd"
        network: private
        radio: [11a_standard, 11g_standard]
        ifname_hint: pr

      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-risi: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-risi: 13-20

