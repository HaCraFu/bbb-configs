---

location: hacrafu-casarecce
location_nice: Petershagen/Eggersdorf
# latitude: 52.0
# longitude: 13.0
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:

  - hostname: hacrafu-casarecce
    role: corerouter
    model: "genexis_pulse-ex400"
    wireless_profile: freifunk_hacrafu
    flow_offload: hw
    host__rclocal__to_merge:
      - |
        uci set network.vlan_40.ports='lan:u'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

  - hostname: hacrafu-casarecce-left
    role: ap
    model: "genexis_pulse-ex400"
    wireless_profile: freifunk_hacrafu

  - hostname: hacrafu-casarecce-right
    role: ap
    model: "genexis_pulse-ex400"
    wireless_profile: freifunk_hacrafu

ipv6_prefix: "2001:bf7:850:5700::/56"

# DHCP      10.31.71.80/28
# MESH      10.31.74.192/29
# MGMT      10.31.74.200/29
# TUNNEL    10.31.18.26/31

networks:
  # MESH - 5 GHz 802.11s - Core
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.74.192/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-casarecce
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Core
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.74.193/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-casarecce
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - Left
  - vid: 22
    role: mesh
    name: mesh_5g_l
    prefix: 10.31.74.194/32
    ipv6_subprefix: -22
    mesh_ap: hacrafu-casarecce-left
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Left
  - vid: 23
    role: mesh
    name: mesh_2g_l
    prefix: 10.31.74.195/32
    ipv6_subprefix: -23
    mesh_ap: hacrafu-casarecce-left
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - Right
  - vid: 24
    role: mesh
    name: mesh_5g_r
    prefix: 10.31.74.196/32
    ipv6_subprefix: -24
    mesh_ap: hacrafu-casarecce-right
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - Right
  - vid: 25
    role: mesh
    name: mesh_2g_r
    prefix: 10.31.74.197/32
    ipv6_subprefix: -25
    mesh_ap: hacrafu-casarecce-right
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.71.80/28
    ipv6_subprefix: 0
    assignments:
      hacrafu-casarecce: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.31.74.200/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-casarecce: 1        # 201
      hacrafu-casarecce-left: 2   # 202
      hacrafu-casarecce-right: 3  # 203

  # UPLINK
  - vid: 50
    role: uplink
    # igress: 10
    # egress: 10

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.31.18.26/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.31.18.27/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-casarecce: 36-80
  hacrafu-casarecce-left: 36-80
  hacrafu-casarecce-right: 36-80

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-casarecce: 13-40
  hacrafu-casarecce-left: 13-40
  hacrafu-casarecce-right: 13-40

